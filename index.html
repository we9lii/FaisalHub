<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FaisalHub - تهنئة العيد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Tajawal:wght@200;300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #7a5e20;
      --bg: #060608;
      --surface: #0e0e12;
      --surface-hover: #1a1a22;
      --white: #f5f0e8;
      --muted: #5a5560;
      --success: #2ecc71;
      --transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100vh;
      background: var(--bg);
      color: var(--white);
      font-family: 'Tajawal', sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* ─── Noise Overlay ─── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
    }

    /* ─── Background Glow ─── */
    .bg-glow {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 60%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 60%);
      z-index: 0;
    }

    /* ─── Grid Lines ─── */
    .grid-lines {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 100px 100px;
      z-index: 0;
      animation: gridFade 4s ease-out forwards;
    }
    @keyframes gridFade { 0% { opacity: 0; } 100% { opacity: 1; } }

    /* ─── Orbs ─── */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 1;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.1), transparent 70%);
      top: -150px; left: 50%; transform: translateX(-50%);
      animation: orbFloat1 10s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(201,168,76,0.08), transparent 70%);
      bottom: -100px; right: -150px;
      animation: orbFloat2 12s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(201,168,76,0.06), transparent 70%);
      top: 50%; left: -150px; transform: translateY(-50%);
      animation: orbFloat3 8s ease-in-out infinite alternate;
    }
    @keyframes orbFloat1 { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(50px); } }
    @keyframes orbFloat2 { from { transform: translate(0, 0); } to { transform: translate(-40px, -50px); } }
    @keyframes orbFloat3 { from { transform: translateY(-50%) translateX(0); } to { transform: translateY(-50%) translateX(40px); } }

    /* ─── Bars ─── */
    .top-bar, .bottom-bar {
      position: fixed; left: 0; right: 0; height: 1px;
      opacity: 0; animation: fadeIn 1.2s 0.5s forwards; z-index: 5;
    }
    .top-bar { top: 0; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .bottom-bar { bottom: 0; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); }

    /* ─── Corner Ornaments ─── */
    .corner {
      position: fixed; width: 60px; height: 60px; opacity: 0;
      animation: fadeIn 1.5s 0.8s forwards; z-index: 5;
    }
    .corner svg { width: 100%; height: 100%; filter: drop-shadow(0 0 10px rgba(201,168,76,0.3)); }
    .corner-tl { top: 15px; left: 15px; }
    .corner-tr { top: 15px; right: 15px; transform: scaleX(-1); }
    .corner-bl { bottom: 15px; left: 15px; transform: scaleY(-1); }
    .corner-br { bottom: 15px; right: 15px; transform: scale(-1); }

    /* ─── Hero Section ─── */
    .hero {
      position: relative; z-index: 10;
      width: 100%; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 60px 20px 40px;
    }

    .pre-title {
      font-weight: 200; font-size: clamp(11px, 1.5vw, 14px);
      letter-spacing: 0.5em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 24px;
      opacity: 0; animation: slideUp 1s 0.4s forwards;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: clamp(56px, 12vw, 140px);
      line-height: 0.85; letter-spacing: -0.02em;
      background: linear-gradient(160deg, var(--gold-dim), var(--gold) 30%, var(--gold-light) 50%, var(--gold) 70%, var(--gold-dim));
      background-size: 200% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: logoReveal 1.5s 0.2s cubic-bezier(0.16,1,0.3,1) forwards, shimmer 5s 2s linear infinite;
      opacity: 0; transform: translateY(80px);
      text-shadow: 0 0 80px rgba(201,168,76,0.3);
    }
    @keyframes logoReveal { to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

    .divider {
      display: flex; align-items: center; gap: 20px; margin: 28px 0 36px;
      opacity: 0; animation: slideUp 1s 0.7s forwards;
    }
    .divider-line { width: 100px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
    .divider-line.right { background: linear-gradient(90deg, var(--gold), transparent); }
    .divider-diamond {
      width: 8px; height: 8px; background: linear-gradient(135deg, var(--gold), var(--gold-light));
      transform: rotate(45deg); box-shadow: 0 0 20px rgba(201,168,76,0.5);
    }

    .subtitle-line {
      width: 2px; height: 0; background: linear-gradient(180deg, var(--gold), transparent);
      margin: 20px auto; animation: lineGrow 1s 1.2s ease forwards;
    }
    @keyframes lineGrow { from { height: 0; } to { height: 60px; } }

    .tagline {
      font-weight: 300; font-size: clamp(17px, 2.8vw, 28px);
      color: var(--white); letter-spacing: 0.08em; margin-top: 28px;
      opacity: 0; animation: slideUp 1.2s 1.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .tagline span { color: var(--gold); font-weight: 600; }

    .badge {
      margin-top: 45px; display: inline-flex; align-items: center; gap: 14px;
      padding: 12px 32px; border: 1px solid rgba(201,168,76,0.25);
      background: rgba(201,168,76,0.03); backdrop-filter: blur(12px);
      font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--gold); opacity: 0; animation: slideUp 1s 1.7s forwards;
      position: relative; overflow: hidden; border-radius: 50px;
    }
    .badge::before {
      content: ''; position: absolute; left: -100%; top: 0; bottom: 0; width: 50%;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.1), transparent);
      animation: badgeSweep 4s 3s ease-in-out infinite;
    }
    @keyframes badgeSweep { 0% { left: -100%; } 100% { left: 200%; } }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: pulse 2.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); box-shadow: 0 0 10px var(--gold); } 50% { opacity:0.3; transform:scale(0.8); } }

    .footer-text {
      position: fixed; bottom: 25px; font-size: 9px; letter-spacing: 0.35em;
      color: var(--muted); text-transform: uppercase;
      opacity: 0; animation: fadeIn 1s 2.2s forwards; z-index: 10;
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ─── Stars ─── */
    .stars { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .star {
      position: absolute; width: 2px; height: 2px; background: var(--gold);
      border-radius: 50%; opacity: 0;
      animation: starTwinkle var(--d, 4s) var(--delay, 0s) ease-in-out infinite;
    }
    @keyframes starTwinkle { 0%,100% { opacity: 0; transform: scale(0.8); } 50% { opacity: var(--max-op, 0.7); transform: scale(1.2); } }

    /* ═══════════════════════════════════════════════════════ */
    /* ═══════ 🎁 BOT SECTION ═══════ */
    /* ═══════════════════════════════════════════════════════ */

    .bot-section {
      position: relative; z-index: 15;
      width: 100%; max-width: 850px;
      margin: 80px auto 120px; padding: 50px 40px;
      background: linear-gradient(145deg, rgba(14,14,18,0.97), rgba(20,20,28,0.99));
      border: 1px solid rgba(201,168,76,0.18); border-radius: 24px;
      backdrop-filter: blur(30px);
      box-shadow: 
        0 0 0 1px rgba(201,168,76,0.08),
        0 30px 80px rgba(0,0,0,0.6),
        0 0 120px rgba(201,168,76,0.04);
      opacity: 0; transform: translateY(50px);
      animation: slideUp 1.2s 2.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .bot-header {
      text-align: center; margin-bottom: 40px;
      padding-bottom: 30px; 
      border-bottom: 1px solid rgba(201,168,76,0.12);
    }

    .bot-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 5.5vw, 42px); font-weight: 600;
      color: var(--gold); margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      text-shadow: 0 0 40px rgba(201,168,76,0.2);
    }
    .bot-title svg { width: 32px; height: 32px; animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(201,168,76,0.4)); }
    @keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(5deg); } }

    .bot-desc {
      font-size: 15px; color: var(--muted); line-height: 1.9;
      max-width: 500px; margin: 0 auto;
    }

    .input-group {
      display: flex; gap: 14px; margin-bottom: 35px;
      flex-wrap: wrap; justify-content: center;
    }

    .name-input {
      flex: 1; min-width: 220px; max-width: 380px;
      padding: 18px 26px; font-size: 17px; font-family: 'Tajawal', sans-serif;
      background: var(--surface); border: 1px solid rgba(201,168,76,0.25);
      border-radius: 14px; color: var(--white); outline: none;
      transition: var(--transition); text-align: center;
      letter-spacing: 0.05em;
    }
    .name-input::placeholder { color: var(--muted); opacity: 0.7; }
    .name-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(201,168,76,0.12), 0 0 30px rgba(201,168,76,0.15);
      background: var(--surface-hover);
    }

    .generate-btn {
      padding: 18px 36px; font-family: 'Tajawal', sans-serif;
      font-size: 15px; font-weight: 600; letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: #0a0a0c; border: none; border-radius: 14px;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; gap: 10px;
      min-width: 150px; justify-content: center;
      box-shadow: 0 10px 40px rgba(201,168,76,0.2);
    }
    .generate-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 50px rgba(201,168,76,0.35);
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
    }
    .generate-btn:active { transform: translateY(-1px); }
    .generate-btn svg { width: 20px; height: 20px; }

    .loading { display: none; text-align: center; padding: 30px; }
    .loading.active { display: block; }
    .loader {
      width: 50px; height: 50px;
      border: 3px solid rgba(201,168,76,0.15);
      border-top-color: var(--gold); border-radius: 50%;
      margin: 0 auto 20px; animation: spin 1s linear infinite;
      box-shadow: 0 0 30px rgba(201,168,76,0.2);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: 14px; letter-spacing: 0.1em; }

    .results-area { display: none; animation: fadeIn 0.6s ease; }
    .results-area.active { display: block; }

    .personal-greeting {
      background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
      border: 1px solid rgba(201,168,76,0.25); border-radius: 18px;
      padding: 30px 25px; margin-bottom: 35px; text-align: center;
      position: relative; overflow: hidden;
    }
    .personal-greeting::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .personal-greeting::after {
      content: '✨'; position: absolute; top: 15px; right: 20px;
      font-size: 20px; opacity: 0.6; animation: float 3s ease-in-out infinite;
    }

    .greeting-text {
      font-size: clamp(18px, 3vw, 24px); font-weight: 400;
      line-height: 2; margin-bottom: 24px; color: var(--white);
      white-space: pre-line;
    }
    .greeting-text .signature {
      display: block; margin-top: 16px; padding-top: 16px;
      border-top: 1px dashed rgba(201,168,76,0.3);
      color: var(--gold); font-weight: 600; font-size: 1.1em;
      letter-spacing: 0.05em;
    }

    .copy-main-btn {
      padding: 13px 30px; background: transparent;
      border: 1px solid var(--gold); color: var(--gold);
      border-radius: 12px; font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 500; letter-spacing: 0.05em; cursor: pointer;
      transition: var(--transition);
      display: inline-flex; align-items: center; gap: 9px;
    }
    .copy-main-btn:hover { 
      background: rgba(201,168,76,0.08); 
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201,168,76,0.15);
    }
    .copy-main-btn.copied { background: var(--success); border-color: var(--success); color: #fff; }

    .results-header {
      display: flex; justify-content: space-between; align-items: center;
      margin: 35px 0 22px; padding-bottom: 15px;
      border-bottom: 1px solid rgba(201,168,76,0.12);
      flex-wrap: wrap; gap: 12px;
    }

    .section-title {
      font-size: 17px; color: var(--gold);
      display: flex; align-items: center; gap: 10px; font-weight: 500;
      letter-spacing: 0.05em;
    }
    .section-title svg { width: 20px; height: 20px; }

    .results-counter {
      font-size: 13px; color: var(--muted);
      background: rgba(201,168,76,0.06);
      padding: 7px 16px; border-radius: 20px;
      border: 1px solid rgba(201,168,76,0.15);
      letter-spacing: 0.05em;
    }

    .suggestions-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .suggestion-card {
      background: var(--surface); border: 1px solid rgba(201,168,76,0.12);
      border-radius: 16px; padding: 22px 24px;
      transition: var(--transition); position: relative; overflow: hidden;
      opacity: 0; transform: translateY(25px);
      animation: cardAppear 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes cardAppear {
      to { opacity: 1; transform: translateY(0); }
    }
    .suggestion-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      opacity: 0; transition: var(--transition);
    }
    .suggestion-card::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(201,168,76,0.03), transparent 70%);
      opacity: 0; transition: var(--transition);
    }
    .suggestion-card:hover {
      border-color: rgba(201,168,76,0.35);
      transform: translateY(-4px); background: var(--surface-hover);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    .suggestion-card:hover::before { opacity: 1; }
    .suggestion-card:hover::after { opacity: 1; }

    .suggestion-text {
      font-size: 15px; line-height: 1.9; color: var(--white);
      margin-bottom: 16px; min-height: 70px;
      display: -webkit-box; -webkit-line-clamp: 4;
      -webkit-box-orient: vertical; overflow: hidden;
      white-space: pre-line;
    }
    .suggestion-text .sig { 
      display: block; margin-top: 12px; padding-top: 12px;
      border-top: 1px dashed rgba(201,168,76,0.25);
      color: var(--gold); font-weight: 600; 
    }

    .copy-btn {
      width: 100%; padding: 11px 16px;
      background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.2);
      color: var(--gold); border-radius: 10px;
      font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 7px;
      letter-spacing: 0.03em;
    }
    .copy-btn:hover { 
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.35);
    }
    .copy-btn.copied { background: var(--success); border-color: var(--success); color: #fff; }
    .copy-btn svg { width: 15px; height: 15px; transition: var(--transition); }
    .copy-btn.copied svg { animation: checkPop 0.5s ease; }
    @keyframes checkPop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.3); } 100% { transform: scale(1); opacity: 1; } }

    /* ─── Load More Button ─── */
    .load-more-container {
      text-align: center; margin-top: 35px;
      opacity: 0; animation: fadeIn 0.6s 0.4s forwards;
    }
    .load-more-btn {
      padding: 16px 45px;
      background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(201,168,76,0.18));
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold); border-radius: 14px;
      font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      display: inline-flex; align-items: center; gap: 12px;
      letter-spacing: 0.05em;
    }
    .load-more-btn:hover {
      background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.28));
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(201,168,76,0.2);
      border-color: rgba(201,168,76,0.45);
    }
    .load-more-btn:active { transform: translateY(-1px); }
    .load-more-btn svg { width: 20px; height: 20px; animation: bounce 2.5s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .load-more-btn.hidden { display: none; }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(135deg, var(--surface), var(--surface-hover));
      border: 1px solid var(--success);
      color: var(--success); padding: 15px 30px; border-radius: 14px;
      font-size: 14px; font-weight: 500; display: flex;
      align-items: center; gap: 10px; 
      box-shadow: 0 15px 50px rgba(0,0,0,0.5), 0 0 30px rgba(46,204,113,0.15);
      z-index: 1000; transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
      opacity: 0; letter-spacing: 0.03em;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ─── Decorations ─── */
    .decoration {
      position: absolute; pointer-events: none; opacity: 0.06; z-index: 0;
      font-size: 80px; animation: float 8s ease-in-out infinite;
    }
    .decoration-1 { top: 20%; left: 3%; }
    .decoration-2 { bottom: 15%; right: 3%; animation-delay: -4s; }
    .decoration-3 { top: 60%; left: 5%; font-size: 50px; animation-delay: -2s; }
    .decoration-4 { top: 10%; right: 5%; font-size: 40px; animation-delay: -6s; }

    @media (max-width: 768px) {
      .bot-section { margin: 50px 18px 100px; padding: 35px 22px; }
      .input-group { flex-direction: column; align-items: center; }
      .name-input { width: 100%; max-width: none; }
      .generate-btn { width: 100%; max-width: 320px; }
      .suggestions-grid { grid-template-columns: 1fr; }
      .personal-greeting { padding: 24px 18px; }
      .results-header { flex-direction: column; align-items: flex-start; gap: 14px; }
      .corner { width: 40px; height: 40px; }
    }

    @media (max-width: 480px) {
      .footer-text { font-size: 8px; bottom: 18px; }
      .badge { padding: 10px 24px; font-size: 10px; }
      .decoration { font-size: 50px; }
      .bot-title { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="grid-lines"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>

      const sig = buildSignature(name);
      const html = `${template}<span class="signature">${sig}</span>`;
      const plain = `${template}\n${sig}`;
      return { html, plain };
    }

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

          btn.querySelector('.btn-text').textContent = 'تم النسخ! ✓';

        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = original;

      } catch {

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
          ✨ عرض ${nextBatch} المزيد
        `;
      }
    }

    function renderCards(greetings, name, startIndex) {
      greetings.forEach((template, index) => {
        const { html, plain } = buildGreeting(name, template);
        const card = document.createElement('div');
        card.className = 'suggestion-card';
        card.style.animationDelay = `${(index % BATCH_SIZE) * 0.07}s`;
        card.innerHTML = `
          <p class="suggestion-text">${html}</p>
          <button class="copy-btn" data-text="${plain.replace(/"/g,'&quot;')}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            نسخ
          </button>
        `;
        suggestionsGrid.appendChild(card);
        
        card.querySelector('.copy-btn').onclick = (e) => {
          const text = e.currentTarget.dataset.text;
          copyText(text, e.currentTarget);
        };
      });
    }

    // ═════ Load More Handler ═════
    loadMoreBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      const remaining = greetingTemplates.length - displayedCount;
      const batchSize = Math.min(BATCH_SIZE, remaining);
      
      const nextBatch = allGreetings.slice(displayedCount, displayedCount + batchSize);
      renderCards(nextBatch, name, displayedCount);
      
      displayedCount += batchSize;
      updateCounter();
      updateLoadMoreButton();
    });

    // ═════ Main Logic ═════
    generateBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      if (!name) {
        nameInput.focus();
        nameInput.style.borderColor = '#e74c3c';
        showToast('اكتب اسمك أولاً ✍️');
        setTimeout(() => nameInput.style.borderColor = '', 1500);
        return;
      }

      loading.classList.add('active');
      resultsArea.classList.remove('active');
      generateBtn.disabled = true;
      generateBtn.style.opacity = '0.7';

      await new Promise(r => setTimeout(r, 1200));

      // Shuffle and store all greetings
      allGreetings = shuffleArray(greetingTemplates);
      displayedCount = 0;
      suggestionsGrid.innerHTML = '';

      // Main greeting
      const mainTemplate = getRandom(greetingTemplates);
      const { html, plain } = buildGreeting(name, mainTemplate);
      personalGreeting.innerHTML = html;
      copyMainBtn.onclick = () => copyText(plain, copyMainBtn);

      // First batch
      const firstBatch = allGreetings.slice(0, BATCH_SIZE);
      renderCards(firstBatch, name, 0);
      
      displayedCount = BATCH_SIZE;
      updateCounter();
      updateLoadMoreButton();

      loading.classList.remove('active');
      resultsArea.classList.add('active');
      generateBtn.disabled = false;
      generateBtn.style.opacity = '1';

      if (window.innerWidth < 768) {
        resultsArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    nameInput.addEventListener('keypress', e => { if (e.key === 'Enter') generateBtn.click(); });
    setTimeout(() => { if (window.innerWidth > 768) nameInput.focus(); }, 2500);
  </script>
</body>
</html>
